<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学竖式练习题生成器</title>
    <style>
        :root {
            --base-font-size: 22px;
            --op-font-size: 36px;
            --font-family: "Courier New", Courier, monospace;
            --header-font-family: "SimHei", "Heiti SC", sans-serif;
            --header-font-size: 14pt;
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #E0E7FF;
            --success: #10B981;
            --success-dark: #059669;
            --warning: #F59E0B;
            --danger: #EF4444;
            --purple: #8B5CF6;
            --bg-body: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-dark: #1E293B;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --radius: 12px;
            --radius-sm: 8px;
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { margin: 0; padding: 0; width: 210mm; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .controls, .stats-panel { display: none !important; }
            .preview { box-shadow: none !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background: white !important; border: none !important; }
            .page { width: 210mm; height: 297mm; margin: 0; padding: 10mm; box-sizing: border-box; page-break-after: always; background: white; position: relative; overflow: hidden; }
            .page:last-child { page-break-after: auto; }
            .page.horizontal { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(10, 1fr); gap: 2mm; align-content: start; padding-top: 15mm; }

            .horizontal .problem-container { justify-content: center; padding-top: 0; }
            .vertical .vertical-wrapper { display: inline-flex; flex-direction: column; align-items: flex-end; font-size: var(--base-font-size); font-weight: bold; line-height: 1.1; font-family: var(--font-family); width: 100%; margin-top: 5mm; position: relative; }
            .vertical .division-wrapper { display: inline-flex; flex-direction: column; align-items: flex-end; position: relative; padding-top: 2px; width: 100%; margin-top: 5mm; }

            .vertical .division-dividend { letter-spacing: 3px; font-weight: bold; font-family: var(--font-family); font-size: var(--base-font-size); }
            .vertical .char-vertical { display: flex; flex-direction: column; align-items: flex-end; font-size: var(--base-font-size); line-height: 1.1; font-family: var(--font-family); width: 100%; position: relative; padding-right: 2px; }
            .vertical .char-vertical .line1 { letter-spacing: 3px; font-weight: bold; width: 100%; text-align: right; line-height: 1.2; display: inline-block; min-width: 2em; }
            .vertical .char-vertical .line2-wrapper { position: relative; width: 100%; text-align: right; line-height: 1.2; height: 1.2em; display: flex; justify-content: flex-end; align-items: flex-end; }
            .vertical .char-vertical .num2-span { letter-spacing: 3px; font-weight: bold; z-index: 1; }

            .page.horizontal { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(10, 1fr); gap: 2mm; align-content: start; padding-top: 15mm; }
            .page.vertical { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 5mm; align-content: start; padding-top: 15mm; }
            .page-header { position: absolute; top: 5mm; left: 10mm; right: 10mm; height: 10mm; display: flex; justify-content: center; align-items: center; gap: 30px; font-family: var(--header-font-family); font-size: var(--header-font-size); border-bottom: 2px solid var(--border); padding-bottom: 1mm; color: var(--text-dark); z-index: 10; }
            .header-item { display: flex; align-items: center; gap: 8px; }
            .header-line { border-bottom: 1px dashed #94A3B8; flex-grow: 1; height: 16px; min-width: 80px; }

            .horizontal .problem-container { justify-content: center; padding-top: 0; }
            .problem-container.mixed { font-size: 18px; }
            .vertical .vertical-wrapper { display: inline-flex; flex-direction: column; align-items: flex-end; font-size: var(--base-font-size); font-weight: bold; line-height: 1.1; font-family: var(--font-family); width: 100%; margin-top: 5mm; position: relative; }
            .vertical .division-wrapper { display: inline-flex; flex-direction: column; align-items: flex-end; position: relative; padding-top: 2px; width: 100%; margin-top: 5mm; }
            .vertical .division-body { display: flex; align-items: flex-end; }
            .vertical .division-divisor { padding-right: 6px; font-weight: bold; font-family: var(--font-family); font-size: var(--base-font-size); }
            .vertical .division-sign { border-left: 2.5px solid; border-top: 2.5px solid; padding: 3px 8px 2px 6px; margin-right: 2px; border-radius: 3px 0 0 0; display: flex; align-items: center; }
            .vertical .division-dividend { letter-spacing: 3px; font-weight: bold; font-family: var(--font-family); font-size: var(--base-font-size); }
            .vertical .char-vertical { display: flex; flex-direction: column; align-items: flex-end; font-size: var(--base-font-size); line-height: 1.1; font-family: var(--font-family); width: 100%; position: relative; padding-right: 2px; }
            .vertical .char-vertical .line1 { letter-spacing: 3px; font-weight: bold; width: 100%; text-align: right; line-height: 1.2; display: inline-block; min-width: 2em; }
            .vertical .char-vertical .line2-wrapper { position: relative; width: 100%; text-align: right; line-height: 1.2; height: 1.2em; display: flex; justify-content: flex-end; align-items: flex-end; }
            .vertical .char-vertical .operator-char { font-size: var(--op-font-size); font-weight: 900; position: absolute; left: 1em; bottom: 6px; line-height: 1; display: inline-block; width: 1em; text-align: center; z-index: 2; transform: translateY(2px); }
            .vertical .char-vertical .num2-span { letter-spacing: 3px; font-weight: bold; z-index: 1; }
            .vertical .char-vertical .divider { width: 100%; border-top: 3px solid var(--text-dark); margin: 4px 0; box-sizing: border-box; }
            .vertical .char-vertical .empty-line { flex-grow: 1; min-height: 25mm; }
            .stats-panel { background: var(--bg-card); max-width: 1100px; margin: 24px auto; padding: 28px; border-radius: var(--radius); box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
            .stats-panel h4 { margin: 0 0 15px 0; color: var(--text-dark); font-size: 18px; font-weight: 700; padding-bottom: 8px; border-bottom: 2px solid var(--success); display: flex; align-items: center; gap: 10px; }
            .stats-panel h4::before { content: ''; display: inline-block; width: 24px; height: 24px; background: linear-gradient(135deg, var(--primary), var(--purple)); border-radius: 6px; }
            .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
            .stat-item { background: #F8FAFC; padding: 18px; border-radius: var(--radius-sm); border-left: 4px solid var(--primary); transition: transform 0.2s, box-shadow 0.2s; }
            .stat-item:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
            .stat-label { font-size: 14px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
            .stat-value { font-size: 26px; font-weight: 700; color: var(--text-dark); }
            .progress-bar { width: 100%; height: 8px; background: #E2E8F0; border-radius: 4px; margin-top: 10px; overflow: hidden; }
            .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--purple)); border-radius: 4px; transition: width 0.4s ease; }

            .mixed-options { margin-left: 32px; margin-top: 12px; padding: 18px; background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%); border-radius: var(--radius-sm); border: 1px solid #DDD6FE; display: none; }
            .mixed-options.show { display: block; animation: slideDown 0.25s ease; }
            .mixed-options-label { font-size: 14px; color: var(--purple); margin-bottom: 12px; display: block; font-weight: 600; }
            .mixed-options label { display: inline-flex; align-items: center; margin-right: 16px; cursor: pointer; font-size: 15px; margin-bottom: 8px; padding: 8px 14px; border-radius: 6px; background: white; border: 1px solid #DDD6FE; transition: all 0.2s; }
            .mixed-options label:hover { background: #EDE9FE; border-color: var(--purple); }

<body>
    <div class="controls">
        <h3>✨ Alivn数学练习题生成器 <span style="font-size:16px;font-weight:400;color:#64748B;">V2.1</span></h3>

        <div class="notice">
            <strong>💡 使用说明：</strong>
            <br>✅ <strong>本练习题生成器为小学生初级阶段数学练习使用，不含小数、负数计算。</strong>
            <br><a href="xuexiti_v2_使用说明书.html" target="_blank" style="color:#92400E; font-weight:600;">点击查看完整使用说明书 →</a>
        </div>

        <div class="control-section">
            <h4>1️⃣ 难度等级</h4>
            <div class="radio-group">
                <label><input type="radio" name="difficulty" value="basic"> 容易（无进借位）</label>
                <label><input type="radio" name="difficulty" value="standard" checked> 中等（含部分进借位）</label>
                <label><input type="radio" name="difficulty" value="challenge">  困难（全部进借位）</label>
            </div>
        </div>

        <div class="control-section">
            <h4>2️⃣ 运算类型</h4>
            <div class="control-group" id="operationGroup">
                <label id="addLabel"><input type="checkbox" name="operation" value="+" id="addCheckbox"> 加法</label>
                <label id="subLabel"><input type="checkbox" name="operation" value="-" id="subCheckbox"> 减法</label>
                <label id="multLabel"><input type="checkbox" name="operation" value="×" id="multCheckbox"> 乘法</label>
                <label id="divLabel"><input type="checkbox" name="operation" value="÷" id="divCheckbox"> 除法</label>
                <label id="mixedLabel"><input type="checkbox" name="operation" value="mixed" id="mixedCheckbox"> 混合运算</label>
                <span class="tip-text" id="mixedTip" style="display:none;">选择混合运算时，竖式计算题功能自动隐藏</span>
            </div>

            <div class="sub-options" id="multOptions">
                <label><input type="checkbox" id="tableMult"> 九九表内乘法</label>
            </div>

            <div class="sub-options" id="divOptions">
                <label><input type="checkbox" id="divTableDiv"> 九九表内除法</label>
                <label><input type="checkbox" id="divTableRemDiv"> 九九表内余数除法</label>
                <label><input type="checkbox" id="divNormalRemDiv"> 普通余数除法</label>
            </div>

            <div class="mixed-options" id="mixedOptions">
                <span class="mixed-options-label">运算组合选择（至少选择2种）：</span>
                <label><input type="checkbox" name="mixedOps" value="+" id="mixedAdd" checked> 加法</label>
                <label><input type="checkbox" name="mixedOps" value="-" id="mixedSub" checked> 减法</label>
                <label><input type="checkbox" name="mixedOps" value="×" id="mixedMult"> 乘法</label>
                <label><input type="checkbox" name="mixedOps" value="÷" id="mixedDiv"> 除法</label>
            </div>
        </div>

        <div class="control-section">
            <h4>3️⃣ 计算范围（可手工调整）</h4>
            <div class="range-inputs">
                <label>最小值：<input type="number" id="minValue" value="50" min="1"></label>
                <label>最大值：<input type="number" id="maxValue" value="100" min="2"></label>
            </div>
            <div style="margin-top: 8px; font-size: 15px; color: var(--text-muted);">
                说明：题目中运算数字的范围，可根据学生不同年级水平，手工调大小整范围。
            </div>
            <div class="range-lock-tip" id="rangeLockTip">
                <span class="tip-text">📌 限九九乘法表内计算（范围1-81），手工设定的计算范围暂不生效</span>
            </div>
        </div>

        <div class="control-section">
            <h4>4️⃣ 出题形式</h4>
            <div class="radio-group" id="calcTypeGroup">
                <label id="horizontalLabel"><input type="radio" name="calcType" value="horizontal" checked id="horizontalRadio"> 横式计算题（每页20题）</label>
                <label id="verticalLabel"><input type="radio" name="calcType" value="vertical" id="verticalRadio"> 竖式计算题（每页12题）</label>
                <span class="calc-type-disabled" id="verticalTip" style="display:none;">混合运算模式下竖式计算题不可用</span>
            </div>
        </div>

        <div class="control-section">
            <h4>5️⃣ 生成设置</h4>
            <div class="control-group">
                <label>填入页数：<input type="number" id="pageCount" value="1" min="1" max="50" style="width:60px; padding: 4px 6px; margin-left: 8px; border: 1px solid #ccc; border-radius: 4px;"> 页（你想要打印多少页？）</label>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-generate" id="generateBtn" onclick="generateProblems()">
                <span>🔄</span> 生成新题目
            </button>
            <button class="btn btn-print" onclick="window.print()">
                <span>🖨️</span> 打印/保存PDF
            </button>
        </div>
        <div class="validation-tip" id="validationTip"></div>
    </div>

    <div class="stats-panel" id="statsPanel" style="display: none;">
        <h4>数据统计</h4>
        <div class="stats-grid" id="statsGrid"></div>
    </div>

    <div class="preview" id="exercisePreview">
        <!-- 页面将通过JavaScript动态生成 -->
    </div>

    <script>
        // 全局去重集合
        let generatedProblems = new Set();
        let problemStats = {};
        let currentMixedOps = ['+', '-'];
        let pageCarryRate = 0.65; // 记录当前页面的进位/借位比例
        let isInitialLoad = true; // 标记是否首次加载

        // 随机整数生成
        function getRandomInt(min, max) {
            if (min > max) return max;
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // 获取数字位数
        function getDigitCount(num) {
            return num.toString().length;
        }

        // ========== 进位/借位检测函数 ==========

        function getCarryCount(num1, num2) {
            let carry = 0, carryCount = 0;
            let s1 = num1.toString().padStart(Math.max(num1.toString().length, num2.toString().length), '0');
            let s2 = num2.toString().padStart(s1.length, '0');

            for (let i = s1.length - 1; i >= 0; i--) {
                let sum = parseInt(s1[i]) + parseInt(s2[i]) + carry;
                if (sum >= 10) {
                    carry = 1;
                    carryCount++;
                } else {
                    carry = 0;
                }
            }
            return carryCount;
        }

        function getBorrowCount(num1, num2) {
            let borrow = 0, borrowCount = 0;
            let s1 = num1.toString().padStart(Math.max(num1.toString().length, num2.toString().length), '0');
            let s2 = num2.toString().padStart(s1.length, '0');

            for (let i = s1.length - 1; i >= 0; i--) {
                let diff = parseInt(s1[i]) - parseInt(s2[i]) - borrow;
                if (diff < 0) {
                    borrow = 1;
                    borrowCount++;
                } else {
                    borrow = 0;
                }
            }
            return borrowCount;
        }

        function getMultiplicationCarryCount(num1, num2) {
            let carryCount = 0;

            if (num1 < 10 && num2 < 10) return 0;
            if (num1 >= 10 && num2 >= 10) return 1;
            if ((num1 >= 10 && num2 >= 5) || (num2 >= 10 && num1 >= 5)) return 1;

            if (num1 < 10 && num2 >= 10) {
                 if (num1 * (num2 % 10) >= 10 || (Math.floor(num2/10) * num1 >= 10)) return 1;
            }
            if (num2 < 10 && num1 >= 10) {
                 if (num2 * (num1 % 10) >= 10 || (Math.floor(num1/10) * num2 >= 10)) return 1;
            }

            return carryCount;
        }

        function hasCarry(num1, num2) { return getCarryCount(num1, num2) > 0; }
        function hasBorrow(num1, num2) { return getBorrowCount(num1, num2) > 0; }

        // ========== 题目指纹生成（智能去重） ==========

        function generateProblemFingerprint(nums, operations) {
            // 混合运算去重：将运算和数字排序后生成指纹
            let key = '';
            const sortedPairs = [];
            for (let i = 0; i < operations.length; i++) {
                sortedPairs.push({ num: nums[i], op: operations[i] });
            }
            sortedPairs.sort((a, b) => {
                if (a.num !== b.num) return a.num - b.num;
                return a.op.localeCompare(b.op);
            });
            key = sortedPairs.map(p => `${p.num}${p.op}`).join('') + '=' + nums[nums.length - 1];
            return key;
        }

        // ========== 困难度评分（用于混合运算候选评估） ==========

        function calculateMixedDifficulty(nums, operations) {
            let totalScore = 0;
            let tempResult = nums[0];

            for (let i = 0; i < operations.length; i++) {
                const op = operations[i];
                const nextNum = nums[i + 1];
                if (op === '+') tempResult = tempResult + nextNum;
                else if (op === '-') tempResult = tempResult - nextNum;
                else if (op === '×') tempResult = tempResult * nextNum;
                else if (op === '÷') {
                    if (nextNum !== 0) tempResult = Math.floor(tempResult / nextNum);
                }
            }

            // 结果大小评分
            const maxValue = parseInt(document.getElementById('maxValue').value) || 50;
            totalScore = Math.min(100, Math.abs(tempResult) / maxValue * 50);

            // 运算复杂度评分
            operations.forEach(op => {
                if (op === '+' || op === '-') totalScore += 20;
                else if (op === '×') totalScore += 30;
                else if (op === '÷') totalScore += 25;
            });

            return Math.min(150, totalScore);
        }

        // ========== 题目生成核心函数 ==========

        function generateAddition(minValue, maxValue, wantCarry, forceNoCarry) {
            if (forceNoCarry) {
                let attempts = 0;
                while (attempts < 200) {
                    let num1 = getRandomInt(minValue, maxValue);
                    let num2 = getRandomInt(minValue, maxValue);
                    if (!hasCarry(num1, num2)) return [num1, num2];
                    attempts++;
                }
            } else if (wantCarry) {
                let attempts = 0;
                while (attempts < 200) {
                    let num1 = getRandomInt(minValue, maxValue);
                    let num2 = getRandomInt(minValue, maxValue);
                    if (hasCarry(num1, num2)) return [num1, num2];
                    attempts++;
                }
            }
            return [getRandomInt(minValue, maxValue), getRandomInt(minValue, maxValue)];
        }

        function generateSubtraction(minValue, maxValue, wantBorrow, forceNoBorrow) {
            if (forceNoBorrow) {
                let attempts = 0;
                while (attempts < 200) {
                    let num1 = getRandomInt(minValue, maxValue);
                    let num2 = getRandomInt(minValue, maxValue);
                    if (num1 < num2) [num1, num2] = [num2, num1];
                    if (num1 > num2 && !hasBorrow(num1, num2)) return [num1, num2];
                    attempts++;
                }
            } else if (wantBorrow) {
                let attempts = 0;
                while (attempts < 200) {
                    let num1 = getRandomInt(minValue, maxValue);
                    let num2 = getRandomInt(minValue, maxValue);
                    if (num1 < num2) [num1, num2] = [num2, num1];
                    if (num1 > num2 && hasBorrow(num1, num2)) return [num1, num2];
                    attempts++;
                }
            }
            let num1 = getRandomInt(minValue, maxValue);
            let num2 = getRandomInt(minValue, maxValue);
            if (num1 < num2) [num1, num2] = [num2, num1];
            return [num1, num2];
        }

        function generateMultiplication(minValue, maxValue, useTableMult, wantCarry, forceNoCarry) {
            if (useTableMult) {
                const highCarryPairs = [[6,7],[6,8],[6,9],[7,6],[7,7],[7,8],[7,9],[8,4],[8,5],[8,6],[8,7],[8,8],[8,9],[9,3],[9,4],[9,5],[9,6],[9,7],[9,8],[9,9]];
                if (wantCarry && Math.random() < 0.7) {
                    const pair = highCarryPairs[getRandomInt(0, highCarryPairs.length - 1)];
                    return [pair[0], pair[1]];
                }
                if (forceNoCarry) {
                    const noCarryPairs = [[1,2],[1,3],[1,4],[1,5],[2,1],[2,2],[2,3],[3,1],[3,2]];
                    const pair = noCarryPairs[getRandomInt(0, noCarryPairs.length - 1)];
                    return [pair[0], pair[1]];
                }
                return [getRandomInt(1, 9), getRandomInt(1, 9)];
            }

            if (forceNoCarry) {
                let attempts = 0;
                while (attempts < 200) {
                    let num1 = getRandomInt(minValue, maxValue);
                    let num2 = getRandomInt(minValue, maxValue);
                    if (getMultiplicationCarryCount(num1, num2) === 0) return [num1, num2];
                    attempts++;
                }
            } else if (wantCarry) {
                let attempts = 0;
                while (attempts < 200) {
                    let num1 = getRandomInt(minValue, maxValue);
                    let num2 = getRandomInt(minValue, maxValue);
                    if (getMultiplicationCarryCount(num1, num2) > 0) return [num1, num2];
                    attempts++;
                }
            }
            return [getRandomInt(minValue, maxValue), getRandomInt(minValue, maxValue)];
        }

        function generateDivision(minValue, maxValue, divType, wantChallenge) {
            if (divType === 'tableRemDiv') {
                const divisor = getRandomInt(2, 9);
                const quotient = getRandomInt(2, 9);
                const remainder = getRandomInt(1, divisor - 1);
                return [divisor * quotient + remainder, divisor];
            }
            else if (divType === 'normalRemDiv') {
                // 普通余数除法：计算范围由用户设定，不受九九表约束
                let attempts = 0;
                while (attempts < 300) {
                    let maxPossibleDivisor = Math.floor(maxValue / 2);
                    if (maxPossibleDivisor < 2) maxPossibleDivisor = 2;
                    let divisor = getRandomInt(2, maxPossibleDivisor);
                    let minQuotient = Math.ceil(minValue / divisor);
                    let maxQuotient = Math.floor(maxValue / divisor);
                    if (minQuotient < 2) minQuotient = 2;
                    if (maxQuotient >= minQuotient) {
                        let quotient = getRandomInt(minQuotient, maxQuotient);
                        let remainder = getRandomInt(1, divisor - 1);
                        let dividend = divisor * quotient + remainder;
                        if (dividend >= minValue && dividend <= maxValue) {
                            return [dividend, divisor];
                        }
                    }
                    attempts++;
                }
                // 保底
                let divisor = getRandomInt(2, 9);
                let quotient = getRandomInt(2, 9);
                let remainder = getRandomInt(1, divisor - 1);
                return [divisor * quotient + remainder, divisor];
            }
            else if (divType === 'tableDiv') {
                const divisor = getRandomInt(2, 9);
                const quotient = getRandomInt(2, 9);
                return [divisor * quotient, divisor];
            }
            else {
                let attempts = 0;
                while (attempts < 300) {
                    let maxPossibleDivisor = Math.floor(maxValue / 2);
                    if (maxPossibleDivisor < 2) maxPossibleDivisor = 2;

                    let divisor = getRandomInt(2, maxPossibleDivisor);
                    let minQuotient = Math.ceil(minValue / divisor);
                    let maxQuotient = Math.floor(maxValue / divisor);

                    if (minQuotient < 2) minQuotient = 2;

                    if (maxQuotient >= minQuotient) {
                        let quotient = getRandomInt(minQuotient, maxQuotient);
                        let dividend = divisor * quotient;

                        if (dividend >= minValue && dividend <= maxValue) {
                            return [dividend, divisor];
                        }
                    }
                    attempts++;
                }

                let divisor = getRandomInt(2, 9);
                let quotient = getRandomInt(2, 9);
                return [divisor * quotient, divisor];
            }
        }

        // ========== 混合运算生成 ==========

        function generateMixedOperation(minValue, maxValue, operations, candidateCount, useTableMult, useTableDiv) {
            let candidates = [];
            const maxAttempts = 800;

            for (let attempt = 0; attempt < maxAttempts && candidates.length < candidateCount; attempt++) {
                let ops = [...operations];
                ops.sort(() => Math.random() - 0.5);

                // === 第一步：构造 ×÷ 子式 ===
                let mdSubs = [];   // 乘除子式 { value, text }
                let nums = [];
                let finalOps = [];
                let valid = true;

                for (let i = 0; i < ops.length; i++) {
                    if (ops[i] === '×') {
                        let n1 = genMultiplicandMixed();
                        let n2 = genMultiplicandMixed();
                        let prod = n1 * n2;
                        mdSubs.push({ n1, n2, op: '×', value: prod, text: n1 + ' × ' + n2 });
                    } else if (ops[i] === '÷') {
                        if (useTableDiv) {
                            // 九九表内除法：除数2~9，商2~9，被除数=除数×商
                            let divisor = getRandomInt(2, 9);
                            let quotient = getRandomInt(2, 9);
                            let dividend = divisor * quotient;
                            mdSubs.push({ n1: dividend, n2: divisor, op: '÷', value: quotient, text: dividend + ' ÷ ' + divisor });
                        } else {
                            // 普通除法：与 generateDivision 的 else 分支逻辑一致
                            // 除数在2~maxValue/2随机，被除数控制在minValue~maxValue范围，商≥2
                            let divisor = getRandomInt(2, Math.max(2, Math.floor(maxValue / 2)));
                            let minQ = Math.max(2, Math.ceil(minValue / divisor));
                            let maxQ = Math.floor(maxValue / divisor);
                            if (maxQ >= minQ) {
                                let quotient = getRandomInt(minQ, maxQ);
                                let dividend = divisor * quotient;
                                mdSubs.push({ n1: dividend, n2: divisor, op: '÷', value: quotient, text: dividend + ' ÷ ' + divisor });
                            } else {
                                valid = false;
                            }
                        }
                    }
                }

                // === 第二步：构造加/减链 ===
                let addSubOps = ops.filter(o => o === '+' || o === '-');

                if (addSubOps.length === 0 && mdSubs.length > 0) {
                    // 纯乘除（2种以上运算时不太可能，保险处理）
                    let combined = mdSubs[0].text;
                    let curVal = mdSubs[0].value;
                    for (let k = 1; k < mdSubs.length; k++) {
                        combined += ' + ' + mdSubs[k].text;
                        curVal += mdSubs[k].value;
                    }
                    nums = [combined];
                    finalOps = [];
                    if (curVal > 0 && curVal <= maxValue * 3) {
                        candidates.push({
                            nums: [combined],
                            operations: [],
                            result: curVal,
                            fingerprint: combined.replace(/\s/g, ''),
                            difficulty: curVal
                        });
                    }
                    continue;
                }

                // 将所有元素（子式 + 加减符号）拼接成值链
                let chain = [];  // { type: 'md'|'op', value, display }
                let mdIdx = 0;

                // 随机分散乘除子式到加减链中
                let slots = addSubOps.length + 1; // N个加减运算 → N+1个位置
                let mdPositions = [];
                // 选择子式放置的位置
                let usedPositions = new Set();
                for (let k = 0; k < mdSubs.length && k < slots; k++) {
                    let pos;
                    do { pos = getRandomInt(0, slots - 1); } while (usedPositions.has(pos));
                    usedPositions.add(pos);
                    mdPositions.push(pos);
                }
                mdPositions.sort((a, b) => a - b);
                mdIdx = 0;

                let asIdx = 0;
                for (let s = 0; s < slots; s++) {
                    if (mdPositions.includes(s) && mdIdx < mdSubs.length) {
                        chain.push({ type: 'md', value: mdSubs[mdIdx].value, display: mdSubs[mdIdx].text });
                        mdIdx++;
                    } else {
                        // 放普通数字
                        let num = getRandomInt(minValue, maxValue);
                        chain.push({ type: 'num', value: num, display: num.toString() });
                    }
                    // 在位置之后放加减运算符
                    if (s < addSubOps.length) {
                        chain.push({ type: 'op', value: addSubOps[asIdx], display: addSubOps[asIdx] });
                        asIdx++;
                    }
                }

                // === 第三步：正向计算并验证 ===
                let result = chain[0].value;
                for (let c = 1; c < chain.length; c++) {
                    if (chain[c].type === 'op') continue;
                    let prevOp = null;
                    for (let p = c - 1; p >= 0; p--) {
                        if (chain[p].type === 'op') { prevOp = chain[p].value; break; }
                    }
                    if (prevOp === '+') {
                        result += chain[c].value;
                    } else if (prevOp === '-') {
                        result -= chain[c].value;
                        if (result < 0) { valid = false; break; }
                    } else {
                        valid = false; break;
                    }
                }

                if (!valid || result <= 0) continue;

                // === 第四步：组装最终表达式 ===
                let fullText = chain.map(c => c.display).join(' ');
                fullText += ' =';

                let fp = fullText.replace(/\s/g, '');

                // 难度评分
                let diff = 0;
                diff += mdSubs.length * 30;
                diff += addSubOps.length * 20;
                diff += Math.min(50, result / maxValue * 20);

                candidates.push({
                    nums: [fullText],
                    operations: ops,
                    result: result,
                    fingerprint: fp,
                    difficulty: diff
                });
            }

            if (candidates.length === 0) {
                // 保底生成（只用加法）
                const n1 = getRandomInt(minValue, maxValue);
                const n2 = getRandomInt(minValue, maxValue);
                return {
                    nums: [n1 + ' + ' + n2],
                    operations: ['+'],
                    result: n1 + n2,
                    fingerprint: n1 + '+' + n2 + '=',
                    difficulty: 0
                };
            }

            candidates.sort((a, b) => b.difficulty - a.difficulty);
            return candidates[0];
        }

        // 混合运算辅助：生成乘数/除数/商（≥2，不等于1）
        // 九九表模式：固定2~9；非九九表模式：使用用户设定的计算范围
        let mixedMinCurrent = 2;  // 由 generateMixedProblems 设置
        let mixedMaxCurrent = 9;  // 由 generateMixedProblems 设置
        function genMultiplicandMixed() {
            if (useTableMultCurrent) return getRandomInt(2, 9);
            return getRandomInt(Math.max(2, mixedMinCurrent), Math.max(2, mixedMaxCurrent));
        }

        // 当前混合运算的表内乘法标志（由 generateMixedProblems 设置）
        let useTableMultCurrent = false;

        // ========== 单题生成 ==========

        // 获取当前选中的除法类型（支持多选，随机返回其中一个）
        // 未选中任何乘法表除法选项时，视为普通除法（计算范围由用户设定）
        function getActiveDivType() {
            const checked = [];
            if (document.getElementById('divTableDiv') && document.getElementById('divTableDiv').checked) checked.push('tableDiv');
            if (document.getElementById('divTableRemDiv') && document.getElementById('divTableRemDiv').checked) checked.push('tableRemDiv');
            if (document.getElementById('divNormalRemDiv') && document.getElementById('divNormalRemDiv').checked) checked.push('normalRemDiv');
            if (checked.length === 0) return 'normal'; // 未选中任何除法子选项时视为普通除法（精确整除）
            return checked[getRandomInt(0, checked.length - 1)];
        }

        function generateOneProblem(operation, calcType, pageCarryRate) {
            const minValue = parseInt(document.getElementById('minValue').value);
            const maxValue = parseInt(document.getElementById('maxValue').value);
            const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
            const config = { basic: 0, standard: pageCarryRate, challenge: 1 };
            const wantCarry = Math.random() < config[difficulty];

            if (isNaN(minValue) || isNaN(maxValue) || minValue < 1 || maxValue < 2 || minValue >= maxValue) {
                return null;
            }

            let num1, num2;
            const useTableMult = document.getElementById('tableMult') ? document.getElementById('tableMult').checked : false;
            // 获取当前选中的除法类型（支持多选，随机选用一个）
            const divType = getActiveDivType();

            const forceNoCarry = (difficulty === 'basic');

            if (operation === '+') {
                [num1, num2] = generateAddition(minValue, maxValue, wantCarry, forceNoCarry);
            } else if (operation === '-') {
                [num1, num2] = generateSubtraction(minValue, maxValue, wantCarry, forceNoCarry);
            } else if (operation === '×') {
                [num1, num2] = generateMultiplication(minValue, maxValue, useTableMult, wantCarry, forceNoCarry);
            } else if (operation === '÷') {
                [num1, num2] = generateDivision(minValue, maxValue, divType, wantCarry);
            }

            if (isNaN(num1) || isNaN(num2) || num1 <= 0 || num2 <= 0) {
                num1 = getRandomInt(Math.max(10, minValue), Math.min(200, maxValue));
                num2 = getRandomInt(Math.max(2, minValue), Math.min(50, maxValue));
            }

            return { num1, num2, operation, calcType };
        }

        function generateProblemWithOp(operation, calcType, pageCarryRate, dynamicCandidateCount) {
            let candidates = [];
            const candidateCount = dynamicCandidateCount || 5;

            for (let i = 0; i < candidateCount; i++) {
                const problem = generateOneProblem(operation, calcType, pageCarryRate);
                if (problem) {
                    problem.difficulty = calculateDifficultySimple(problem.num1, problem.num2, problem.operation);
                    problem.fingerprint = `${problem.num1},${problem.num2},${problem.operation}`;
                    candidates.push(problem);
                }
            }

            if (candidates.length === 0) return null;

            candidates.sort((a, b) => b.difficulty - a.difficulty);

            for (const candidate of candidates) {
                if (!generatedProblems.has(candidate.fingerprint)) {
                    generatedProblems.add(candidate.fingerprint);

                    const op = candidate.operation;
                    const key = op === '+' ? '加法' : op === '-' ? '减法' : op === '×' ? '乘法' : '除法';
                    problemStats[key] = (problemStats[key] || 0) + 1;

                    return candidate;
                }
            }
            return null;
        }

        function calculateDifficultySimple(num1, num2, operation) {
            let score = 0;
            if (operation === '+') {
                score = hasCarry(num1, num2) ? 50 : 0;
            } else if (operation === '-') {
                score = hasBorrow(num1, num2) ? 50 : 0;
            } else if (operation === '×') {
                score = getMultiplicationCarryCount(num1, num2) > 0 ? 50 : 0;
            } else if (operation === '÷') {
                score = 30;
            }
            return score;
        }

        // ========== 主生成函数 ==========

        function generateProblems() {
            const preview = document.getElementById('exercisePreview');
            const validationTip = document.getElementById('validationTip');

            preview.innerHTML = '';
            generatedProblems = new Set();
            problemStats = {};
            validationTip.classList.remove('show');
            validationTip.textContent = '';

            const calcType = document.querySelector('input[name="calcType"]:checked').value;
            const isMixed = document.getElementById('mixedCheckbox') && document.getElementById('mixedCheckbox').checked;
            const countPerPage = calcType === 'horizontal' ? 20 : 12;

            let pageNum = parseInt(document.getElementById('pageCount').value);
            if (isNaN(pageNum) || pageNum < 1) pageNum = 1;
            if (pageNum > 50) pageNum = 50;

            // 获取选中的运算类型
            const checkboxes = document.querySelectorAll('input[name="operation"]:checked');
            const selectedOperations = Array.from(checkboxes).map(cb => cb.value).filter(v => v !== 'mixed');

            if (isMixed) {
                // 混合运算模式
                const mixedOpCheckboxes = document.querySelectorAll('input[name="mixedOps"]:checked');
                const selectedMixedOps = Array.from(mixedOpCheckboxes).map(cb => cb.value);

                if (selectedMixedOps.length < 2) {
                    validationTip.textContent = '⚠️ 混合运算至少需要选择2种运算类型';
                    validationTip.classList.add('show');
                    return;
                }

                currentMixedOps = selectedMixedOps;
                generateMixedProblems(preview, pageNum, countPerPage, calcType);
            } else {
                // 普通运算模式
                if (selectedOperations.length === 0) {
                    validationTip.textContent = '⚠️ 请至少选择一种运算类型';
                    validationTip.classList.add('show');
                    return;
                }

                generateNormalProblems(preview, pageNum, countPerPage, calcType, selectedOperations);
            }

            // 重置首次加载标记
            isInitialLoad = false;
        }

        function generateNormalProblems(preview, pageNum, countPerPage, calcType, selectedOperations) {
            let totalGenerated = 0;

            for (let pageIndex = 0; pageIndex < pageNum; pageIndex++) {
                // 每张试卷随机进位/借位比例（60%~70%）
                const currentPageCarryRate = 0.6 + Math.random() * 0.1;
                pageCarryRate = currentPageCarryRate;

                const page = document.createElement('div');
                page.className = 'page ' + calcType;

                // 添加页眉
                const header = createPageHeader();
                page.appendChild(header);

                let pageProblems = [];

                // 计算配额
                const opCount = selectedOperations.length;
                const baseCount = Math.floor(countPerPage / opCount);
                let remainder = countPerPage % opCount;
                let quotas = {};
                let shuffledOps = [...selectedOperations].sort(() => Math.random() - 0.5);

                selectedOperations.forEach(op => {
                    quotas[op] = baseCount;
                });

                for (let i = 0; i < remainder; i++) {
                    quotas[shuffledOps[i]]++;
                }

                // 动态候选数量：根据去重率调整
                const dedupRate = generatedProblems.size / Math.max(1, totalGenerated + 10);
                const dynamicCandidateCount = Math.min(20, Math.max(5, Math.floor(5 + dedupRate * 15)));

                for (let op of selectedOperations) {
                    let targetCount = quotas[op];
                    let generatedCount = 0;
                    let attempts = 0;
                    const maxAttempts = targetCount * 15;

                    while (generatedCount < targetCount && attempts < maxAttempts) {
                        const problem = generateProblemWithOp(op, calcType, currentPageCarryRate, dynamicCandidateCount);
                        if (problem) {
                            pageProblems.push(problem);
                            generatedCount++;
                            totalGenerated++;
                        }
                        attempts++;
                    }
                }

                // 打乱顺序
                pageProblems.sort(() => Math.random() - 0.5);

                // 渲染
                for (const problem of pageProblems) {
                    const container = createProblemElement(problem, calcType);
                    page.appendChild(container);
                }

                // 填充空位
                let currentCount = pageProblems.length;
                while (currentCount < countPerPage) {
                    const container = document.createElement('div');
                    container.className = 'problem-container';
                    container.innerHTML = '&nbsp;';
                    page.appendChild(container);
                    currentCount++;
                }

                preview.appendChild(page);
            }

            displayStats(totalGenerated, pageNum);
        }

        function generateMixedProblems(preview, pageNum, countPerPage, calcType) {
            let totalGenerated = 0;
            const opsCount = currentMixedOps.length;
            const numCount = opsCount + 1;

            for (let pageIndex = 0; pageIndex < pageNum; pageIndex++) {
                const page = document.createElement('div');
                page.className = 'page ' + calcType;

                // 添加页眉
                const header = createPageHeader();
                page.appendChild(header);

                let pageProblems = [];
                let attempts = 0;
                const maxAttempts = countPerPage * 10;
                const candidateCount = 5;

                while (pageProblems.length < countPerPage && attempts < maxAttempts) {
                    attempts++;
                    const mixedUseTableMult = document.getElementById('tableMult') ? document.getElementById('tableMult').checked : false;
                    // 除法九九表模式：看「九九表内除法」是否勾选
                    const mixedUseTableDiv = document.getElementById('divTableDiv') ? document.getElementById('divTableDiv').checked : false;

                    // 设置表内乘法标志和计算范围供 genMultiplicandMixed 使用
                    useTableMultCurrent = mixedUseTableMult;
                    mixedMinCurrent = parseInt(document.getElementById('minValue').value);
                    mixedMaxCurrent = parseInt(document.getElementById('maxValue').value);

                    const mixed = generateMixedOperation(
                        parseInt(document.getElementById('minValue').value),
                        parseInt(document.getElementById('maxValue').value),
                        currentMixedOps,
                        candidateCount,
                        mixedUseTableMult,
                        mixedUseTableDiv
                    );

                    if (!generatedProblems.has(mixed.fingerprint)) {
                        generatedProblems.add(mixed.fingerprint);
                        pageProblems.push(mixed);
                        totalGenerated++;
                        problemStats['混合运算'] = (problemStats['混合运算'] || 0) + 1;
                    }
                }

                // 渲染混合运算题目
                for (const problem of pageProblems) {
                    const container = document.createElement('div');
                    container.className = 'problem-container mixed';
                    container.textContent = problem.nums[0];
                    page.appendChild(container);
                }

                // 填充空位
                let currentCount = pageProblems.length;
                while (currentCount < countPerPage) {
                    const container = document.createElement('div');
                    container.className = 'problem-container';
                    container.innerHTML = '&nbsp;';
                    page.appendChild(container);
                    currentCount++;
                }

                preview.appendChild(page);
            }


            displayStats(totalGenerated, pageNum);
        }

        function createPageHeader() {
            const header = document.createElement('div');
            header.className = 'page-header';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'header-item';
            nameDiv.innerHTML = '<span>姓名：</span><div class="header-line"></div>';

            const dateDiv = document.createElement('div');
            dateDiv.className = 'header-item';
            dateDiv.innerHTML = '<span>日期：</span><div class="header-line" style="flex-grow:0.5; min-width:50px;"></div>年<div class="header-line" style="flex-grow:0.3; min-width:25px;"></div>月<div class="header-line" style="flex-grow:0.3; min-width:25px;"></div>日';

            header.appendChild(nameDiv);
            header.appendChild(dateDiv);
            return header;
        }

        function createProblemElement(problem, calcType) {
            const { num1, num2, operation } = problem;
            const container = document.createElement('div');
            container.className = 'problem-container';

            if (calcType === 'horizontal') {
                container.textContent = `${num1} ${operation} ${num2} =`;
            } else {
                const verticalWrapper = document.createElement('div');
                verticalWrapper.className = 'vertical-wrapper';

                if (operation === '÷') {
                    const divWrapper = document.createElement('div');
                    divWrapper.className = 'division-wrapper';

                    const divBody = document.createElement('div');
                    divBody.className = 'division-body';

                    const divisorSpan = document.createElement('span');
                    divisorSpan.className = 'division-divisor';
                    divisorSpan.textContent = num2;

                    const divSign = document.createElement('span');
                    divSign.className = 'division-sign';

                    const dividendSpan = document.createElement('span');
                    dividendSpan.className = 'division-dividend';
                    dividendSpan.textContent = num1.toString().split('').join(' ');

                    divSign.appendChild(dividendSpan);
                    divBody.appendChild(divisorSpan);
                    divBody.appendChild(divSign);
                    divWrapper.appendChild(divBody);
                    verticalWrapper.appendChild(divWrapper);
                } else {
                    const charVertical = document.createElement('div');
                    charVertical.className = 'char-vertical';

                    const line1 = document.createElement('div');
                    line1.className = 'line1';
                    line1.textContent = num1.toString().split('').join(' ');

                    const line2Wrapper = document.createElement('div');
                    line2Wrapper.className = 'line2-wrapper';

                    const opChar = document.createElement('span');
                    opChar.className = 'operator-char';
                    if (operation === '×') opChar.textContent = '×';
                    else if (operation === '+') opChar.textContent = '+';
                    else if (operation === '-') opChar.textContent = '−';

                    const num2Span = document.createElement('span');
                    num2Span.className = 'num2-span';
                    num2Span.textContent = num2.toString().split('').join(' ');

                    line2Wrapper.appendChild(opChar);
                    line2Wrapper.appendChild(num2Span);

                    const divider = document.createElement('div');
                    divider.className = 'divider';

                    const emptyLine = document.createElement('div');
                    emptyLine.className = 'empty-line';

                    charVertical.appendChild(line1);
                    charVertical.appendChild(line2Wrapper);
                    charVertical.appendChild(divider);
                    charVertical.appendChild(emptyLine);

                    verticalWrapper.appendChild(charVertical);
                }

                container.appendChild(verticalWrapper);
            }

            return container;
        }

        function displayStats(totalCount, pageNum) {
            const statsPanel = document.getElementById('statsPanel');
            const statsGrid = document.getElementById('statsGrid');

            if (totalCount === 0) {
                statsPanel.style.display = 'none';
                return;
            }

            statsPanel.style.display = 'block';
            statsGrid.innerHTML = '';

            // 1. 题目总数
            const totalItem = document.createElement('div');
            totalItem.className = 'stat-item';
            totalItem.style.borderLeftColor = '#4CAF50';
            totalItem.innerHTML = `
                <div class="stat-label">题目总数</div>
                <div class="stat-value">${totalCount}题</div>
            `;
            statsGrid.appendChild(totalItem);

            // 2. 生成页数
            const pageItem = document.createElement('div');
            pageItem.className = 'stat-item';
            pageItem.style.borderLeftColor = '#2196F3';
            pageItem.innerHTML = `
                <div class="stat-label">生成页数</div>
                <div class="stat-value">${pageNum}页</div>
            `;
            statsGrid.appendChild(pageItem);

            // 3. 类型分布
            const typeItem = document.createElement('div');
            typeItem.className = 'stat-item';
            typeItem.style.borderLeftColor = '#9C27B0';
            let typeHtml = '<div class="stat-label">类型分布</div><div class="stat-value" style="font-size:14px;line-height:1.6;">';
            for (const [key, value] of Object.entries(problemStats)) {
                if (key.startsWith('_')) continue;
                typeHtml += `${key} ${value}题<br>`;
            }
            typeHtml += '</div>';
            typeItem.innerHTML = typeHtml;
            statsGrid.appendChild(typeItem);

            // 4. 难度等级
            const difficulty = document.querySelector('input[name="difficulty"]:checked');
            const difficultyLabels = { basic: '容易', standard: '中等', challenge: '困难' };
            const diffItem = document.createElement('div');
            diffItem.className = 'stat-item';
            diffItem.style.borderLeftColor = '#FF9800';
            diffItem.innerHTML = `
                <div class="stat-label">难度等级</div>
                <div class="stat-value">${difficulty ? difficultyLabels[difficulty.value] : '中等'}</div>
            `;
            statsGrid.appendChild(diffItem);
        }

        // ========== 事件监听初始化 ==========

        function initEventListeners() {
            // 乘法选项
            document.getElementById('multCheckbox').addEventListener('change', function() {
                document.getElementById('multOptions').classList.toggle('show', this.checked);
                updateTableRangeLock();
                updateOperationState();
            });

            // 乘法表范围内练习选项
            document.getElementById('tableMult').addEventListener('change', function() {
                updateTableRangeLock();
            });

            // 除法选项
            document.getElementById('divCheckbox').addEventListener('change', function() {
                document.getElementById('divOptions').classList.toggle('show', this.checked);
                updateTableRangeLock();
                updateOperationState();
            });

            // 除法子选项（多选）
            document.getElementById('divTableDiv').addEventListener('change', updateTableRangeLock);
            document.getElementById('divTableRemDiv').addEventListener('change', updateTableRangeLock);
            document.getElementById('divNormalRemDiv').addEventListener('change', updateTableRangeLock);

            // 混合运算选项
            document.getElementById('mixedCheckbox').addEventListener('change', function() {
                const mixedOptions = document.getElementById('mixedOptions');
                const mixedTip = document.getElementById('mixedTip');
                const multOptions = document.getElementById('multOptions');
                const divOptions = document.getElementById('divOptions');
                const verticalTip = document.getElementById('verticalTip');
                const verticalLabel = document.getElementById('verticalLabel');
                const horizontalRadio = document.getElementById('horizontalRadio');
                const verticalRadio = document.getElementById('verticalRadio');
                const generateBtn = document.getElementById('generateBtn');
                const validationTip = document.getElementById('validationTip');

                if (this.checked) {
                    mixedOptions.classList.add('show');
                    mixedTip.style.display = 'inline';
                    verticalTip.style.display = 'inline';
                    verticalRadio.disabled = true;
                    verticalLabel.classList.add('disabled');
                    horizontalRadio.checked = true;
                    generateBtn.disabled = false;
                    validationTip.classList.remove('show');
                    // 混合运算模式下：根据选中的混合运算类型显示/隐藏子选项
                    updateMixedSubOptions();
                } else {
                    mixedOptions.classList.remove('show');
                    mixedTip.style.display = 'none';
                    verticalTip.style.display = 'none';
                    verticalRadio.disabled = false;
                    verticalLabel.classList.remove('disabled');
                    multOptions.classList.remove('show');
                    divOptions.classList.remove('show');
                    // 恢复余数除法选项显示
                    document.getElementById('divTableRemDiv').parentElement.style.display = '';
                    document.getElementById('divNormalRemDiv').parentElement.style.display = '';
                }
                updateOperationState();
                updateLabelSelection();
            });

            // 混合运算子选项变化时更新提示和子选项显示
            document.querySelectorAll('input[name="mixedOps"]').forEach(function(cb) {
                cb.addEventListener('change', function() {
                    const checked = document.querySelectorAll('input[name="mixedOps"]:checked');
                    const generateBtn = document.getElementById('generateBtn');
                    const validationTip = document.getElementById('validationTip');

                    // 根据选中的运算类型显示对应的子选项
                    updateMixedSubOptions();
                    updateTableRangeLock();

                    if (checked.length < 2) {
                        generateBtn.disabled = true;
                        validationTip.textContent = '混合运算至少需要选择2种运算类型';
                        validationTip.classList.add('show');
                    } else {
                        generateBtn.disabled = false;
                        validationTip.classList.remove('show');
                    }
                });
            });

            // 更新运算类型状态
            document.querySelectorAll('input[name="operation"]').forEach(function(cb) {
                cb.addEventListener('change', function() {
                    updateOperationState();
                    updateLabelSelection();
                });
            });

            // 出题形式变化
            document.querySelectorAll('input[name="calcType"]').forEach(function(radio) {
                radio.addEventListener('change', generateProblems);
            });

            // 难度等级变化
            document.querySelectorAll('input[name="difficulty"]').forEach(function(radio) {
                radio.addEventListener('change', generateProblems);
            });
        }

        function updateOperationState() {
            const mixedChecked = document.getElementById('mixedCheckbox') && document.getElementById('mixedCheckbox').checked;
            const addCb = document.getElementById('addCheckbox');
            const subCb = document.getElementById('subCheckbox');
            const multCb = document.getElementById('multCheckbox');
            const divCb = document.getElementById('divCheckbox');

            const addLabel = document.getElementById('addLabel');
            const subLabel = document.getElementById('subLabel');
            const multLabel = document.getElementById('multLabel');
            const divLabel = document.getElementById('divLabel');
            const mixedLabel = document.getElementById('mixedLabel');
            const generateBtn = document.getElementById('generateBtn');
            const validationTip = document.getElementById('validationTip');

            if (mixedChecked) {
                // 混合运算选中：禁用其他选项
                addCb.disabled = true;
                subCb.disabled = true;
                multCb.disabled = true;
                divCb.disabled = true;
                addLabel.classList.add('disabled');
                subLabel.classList.add('disabled');
                multLabel.classList.add('disabled');
                divLabel.classList.add('disabled');
                generateBtn.disabled = false;
                validationTip.classList.remove('show');
            } else {
                // 普通模式：检查是否有选中的运算类型
                const anyChecked = addCb.checked || subCb.checked || multCb.checked || divCb.checked;

                addCb.disabled = false;
                subCb.disabled = false;
                multCb.disabled = false;
                divCb.disabled = false;
                addLabel.classList.remove('disabled');
                subLabel.classList.remove('disabled');
                multLabel.classList.remove('disabled');
                divLabel.classList.remove('disabled');

                // 动态启用/禁用生成按钮
                if (anyChecked) {
                    generateBtn.disabled = false;
                    validationTip.classList.remove('show');
                } else {
                    generateBtn.disabled = true;
                    if (!isInitialLoad) {
                        validationTip.textContent = '请至少选择一种运算类型';
                        validationTip.classList.add('show');
                    }
                }
            }
        }

        function updateMixedSubOptions() {
            const isMixedMode = document.getElementById('mixedCheckbox') && document.getElementById('mixedCheckbox').checked;
            if (!isMixedMode) {
                // 普通模式下，divOptions 由 divCheckbox 控制，此处不处理
                // 恢复余数除法选项显示
                document.getElementById('divTableRemDiv').parentElement.style.display = '';
                document.getElementById('divNormalRemDiv').parentElement.style.display = '';
                return;
            }

            const mixedMultChecked = document.getElementById('mixedMult') && document.getElementById('mixedMult').checked;
            const mixedDivChecked = document.getElementById('mixedDiv') && document.getElementById('mixedDiv').checked;
            const multOptions = document.getElementById('multOptions');
            const divOptions = document.getElementById('divOptions');

            multOptions.classList.toggle('show', mixedMultChecked);
            divOptions.classList.toggle('show', mixedDivChecked);

            // 混合运算模式下隐藏所有余数除法选项（混合运算不支持余数除法）
            document.getElementById('divTableRemDiv').parentElement.style.display = 'none';
            document.getElementById('divNormalRemDiv').parentElement.style.display = 'none';
        }

        // 乘法表范围锁定：当选择乘法表相关选项时，自动将计算范围锁定为1-81
        function updateTableRangeLock() {
            const isMixedMode = document.getElementById('mixedCheckbox') && document.getElementById('mixedCheckbox').checked;
            const rangeLockTip = document.getElementById('rangeLockTip');
            const minInput = document.getElementById('minValue');
            const maxInput = document.getElementById('maxValue');

            let tableRangeActive = false;

            if (isMixedMode) {
                // 混合运算模式
                const mixedMultChecked = document.getElementById('mixedMult') && document.getElementById('mixedMult').checked;
                const mixedDivChecked = document.getElementById('mixedDiv') && document.getElementById('mixedDiv').checked;
                const tableMultChecked = document.getElementById('tableMult') && document.getElementById('tableMult').checked;
                const divTableDivChecked = document.getElementById('divTableDiv') && document.getElementById('divTableDiv').checked;
                const divTableRemDivChecked = document.getElementById('divTableRemDiv') && document.getElementById('divTableRemDiv').checked;

                // 乘法表范围内练习（需乘法被勾选）或乘法表除法（需除法被勾选）
                if ((mixedMultChecked && tableMultChecked) || (mixedDivChecked && (divTableDivChecked || divTableRemDivChecked))) {
                    tableRangeActive = true;
                }
            } else {
                // 普通运算模式
                const multChecked = document.getElementById('multCheckbox') && document.getElementById('multCheckbox').checked;
                const divChecked = document.getElementById('divCheckbox') && document.getElementById('divCheckbox').checked;
                const tableMultChecked = document.getElementById('tableMult') && document.getElementById('tableMult').checked;
                const divTableDivChecked = document.getElementById('divTableDiv') && document.getElementById('divTableDiv').checked;
                const divTableRemDivChecked = document.getElementById('divTableRemDiv') && document.getElementById('divTableRemDiv').checked;

                if ((multChecked && tableMultChecked) || (divChecked && (divTableDivChecked || divTableRemDivChecked))) {
                    tableRangeActive = true;
                }
            }

            if (tableRangeActive) {
                // 锁定为1-81（九九表最大值为9×9=81）
                minInput.value = 1;
                maxInput.value = 81;
                minInput.readOnly = true;
                maxInput.readOnly = true;
                minInput.style.opacity = '0.6';
                maxInput.style.opacity = '0.6';
                rangeLockTip.style.display = 'block';
            } else {
                // 取消锁定时，恢复为默认值（min=50, max=100）
                minInput.value = 50;
                maxInput.value = 100;
                minInput.readOnly = false;
                maxInput.readOnly = false;
                minInput.style.opacity = '1';
                maxInput.style.opacity = '1';
                rangeLockTip.style.display = 'none';
            }
        }

        function updateLabelSelection() {
            ['addLabel', 'subLabel', 'multLabel', 'divLabel', 'mixedLabel'].forEach(function(id) {
                const label = document.getElementById(id);
                const input = label.querySelector('input');
                if (input && input.checked && !label.classList.contains('disabled')) {
                    label.classList.add('selected');
                } else {
                    label.classList.remove('selected');
                }
            });
        }

        window.onload = function() {
            initEventListeners();

            // 首次加载时自动选中加法，避免弹出验证提示
            document.getElementById('addCheckbox').checked = true;
            isInitialLoad = true;
            updateOperationState();
            updateLabelSelection();

            // 生成初始题目
            generateProblems();
            isInitialLoad = false;
        };
    </script>
</body>
