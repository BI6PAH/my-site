<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alivn数学练习题生成器 V1.2</</title>
    <style>
        /* 全局变量定义 */
        :root {
            --base-font-size: 22px; /* 题目统一字号 */
            --op-font-size: 36px;   /* 运算符号加大字号 (明显大于数字) */
            --font-family: "Courier New", Courier, monospace; /* 题目统一等宽字体 */
            --header-font-family: "SimHei", "Heiti SC", sans-serif; /* 页眉黑体 */
            --header-font-size: 14pt; /* 页眉14号字 */
        }

        /* 打印样式核心配置 */
        @media print {
            @page {
                size: A4;
                margin: 0; 
            }

            body {
                margin: 0;
                padding: 0;
                width: 210mm;
                background: white;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            
            .controls, .stats-panel {
                display: none !important;
            }

            .preview {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                background: white !important;
                border: none !important;
            }
            
            .page {
                width: 210mm;
                height: 297mm;
                margin: 0;
                padding: 10mm; 
                box-sizing: border-box;
                page-break-after: always;
                background: white;
                position: relative;
                overflow: hidden;
            }
            
            .page:last-child {
                page-break-after: auto;
            }

            /* 横式布局：2列 x 10行 = 20题 */
            .page.horizontal {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(10, 1fr);
                gap: 2mm;
                align-content: start;
                padding-top: 15mm;
            }

            /* 竖式布局：3列 x 4行 = 12题 */
            .page.vertical {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(4, 1fr);
                gap: 5mm;
                align-content: start;
                padding-top: 15mm;
            }
            
            /* 页眉样式 */
            .page-header {
                position: absolute;
                top: 5mm;
                left: 10mm;
                right: 10mm;
                height: 10mm;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-family: var(--header-font-family);
                font-size: var(--header-font-size);
                font-weight: normal;
                border-bottom: 1px solid #000;
                padding-bottom: 1mm;
                z-index: 10;
            }

            .header-item {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .header-line {
                border-bottom: 1px dashed #000;
                flex-grow: 1;
                height: 16px;
                min-width: 80px;
            }
            
            .problem-container {
                text-align: center;
                font-size: var(--base-font-size);
                color: black;
                line-height: 1.2;
                display: flex;
                align-items: center;
                justify-content: center;
                break-inside: avoid;
                page-break-inside: avoid;
                font-family: var(--font-family);
                font-weight: bold;
                height: 100%;
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 2mm;
            }
            
            .horizontal .problem-container {
                justify-content: center;
                padding-top: 0;
            }
            
            /* 竖式通用包装器 */
            .vertical .vertical-wrapper {
                display: inline-flex;
                flex-direction: column;
                align-items: flex-end; /* 整体右对齐，确保横线右端对齐 */
                font-size: var(--base-font-size);
                font-weight: bold;
                line-height: 1.1;
                font-family: var(--font-family);
                width: 100%;
                margin-top: 5mm;
                position: relative;
            }
            
            /* 除法特有结构 */
            .vertical .division-wrapper {
                display: inline-flex;
                flex-direction: column;
                align-items: flex-end;
                position: relative;
                padding-top: 2px; 
                width: 100%;
            }
            
            .vertical .division-body {
                display: flex;
                align-items: flex-end;
            }
            
            .vertical .division-divisor {
                padding-right: 6px;
                font-weight: bold;
                font-family: var(--font-family);
                font-size: var(--base-font-size);
            }
            
            .vertical .division-sign {
                border-left: 2.5px solid #000;
                border-top: 2.5px solid #000;
                padding: 3px 8px 2px 6px;
                margin-right: 2px;
                border-radius: 3px 0 0 0;
                display: flex;
                align-items: center;
            }
            
            .vertical .division-dividend {
                letter-spacing: 3px;
                font-weight: bold;
                font-family: var(--font-family);
                font-size: var(--base-font-size);
            }
            
            /* 加减乘竖式容器 */
            .vertical .char-vertical {
                display: flex;
                flex-direction: column;
                align-items: flex-end; /* 内容右对齐 */
                font-size: var(--base-font-size);
                line-height: 1.1;
                font-family: var(--font-family);
                width: 100%;
                position: relative; /* 关键：作为绝对定位的参考系 */
                padding-right: 2px;
            }
            
            .vertical .char-vertical .line1 {
                letter-spacing: 3px;
                font-weight: bold;
                width: 100%;
                text-align: right;
                line-height: 1.2;
                /* 确保第一行数字宽度决定容器有效宽度，从而决定横线宽度 */
                display: inline-block; 
                min-width: 2em; 
            }
            
            .vertical .char-vertical .line2-wrapper {
                position: relative; /* 为符号提供定位上下文，或者直接利用char-vertical */
                width: 100%;
                text-align: right;
                line-height: 1.2;
                height: 1.2em;
                display: flex;
                justify-content: flex-end;
                align-items: flex-end;
            }

            .vertical .char-vertical .num2-span {
                letter-spacing: 3px;
                font-weight: bold;
                /* 数字正常显示 */
                z-index: 1;
            }
            
            /* 【核心修改】运算符号样式 */
            .vertical .char-vertical .operator-char {
                font-size: var(--op-font-size); /* 加大 */
                font-weight: 900; /* 加粗 */
                position: absolute; /* 绝对定位，脱离文档流，不占位 */
                
                /* 水平定位逻辑：固定在横线左侧向右缩进1字符 */
                left: 1em; 
                
                /* 垂直定位逻辑：紧贴横线上方 */
                bottom: 6px; 
                
                line-height: 1;
                display: inline-block;
                width: 1em;
                text-align: center;
                z-index: 2; /* 确保在横线之上 */
                
                /* 视觉修正 */
                transform: translateY(2px); 
            }
            
            .vertical .char-vertical .divider {
                width: 100%; /* 宽度由父容器决定，即由第一行数字决定 */
                border-top: 3px solid #000; /* 横线加粗 */
                margin: 4px 0;
                box-sizing: border-box;
            }
            
            .vertical .char-vertical .empty-line {
                flex-grow: 1;
                min-height: 25mm;
            }
        }

            .buttons {

            .btn {
                padding: 12px 24px;

            .btn-generate {
                background-color: #008CBA;

            }
            
            .btn-generate:hover {
                background-color: #0077a3;

            }
            
            .btn-print {
                background-color: #4CAF50;

            }
            
            .btn-print:hover {
                background-color: #45a049;

            }
            
            .btn:active {
                transform: translateY(0);
            }
            
            .preview {
                background: #fff;

                min-height: 297mm;
                margin: 20px auto;

                display: grid;

            .page-header {
                position: absolute;
                top: 5mm;
                left: 10mm;
                right: 10mm;
                height: 10mm;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-family: var(--header-font-family);
                font-size: var(--header-font-size);
                border-bottom: 1px solid #ccc;
                padding-bottom: 1mm;
                color: #000;
                z-index: 10;
            }

            .header-item {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .header-line {
                border-bottom: 1px dashed #666;
                flex-grow: 1;
                height: 16px;
                min-width: 80px;
            }
            
            .problem-container {
                text-align: center;
                font-size: var(--base-font-size);
                color: black;
                line-height: 1.2;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: var(--font-family);
                font-weight: bold;
                height: 100%;
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 2mm;
            }
            
            .horizontal .problem-container {
                justify-content: center;
                padding-top: 0;
            }
            
            .vertical .vertical-wrapper {
                display: inline-flex;
                flex-direction: column;
                align-items: flex-end;
                font-size: var(--base-font-size);
                font-weight: bold;

                font-family: var(--font-family);
                width: 100%;
                margin-top: 5mm;
                position: relative;
            }
            
            .vertical .division-wrapper {
                display: inline-flex;
                flex-direction: column;
                align-items: flex-end;
                position: relative;
                padding-top: 2px;

            }
            
            .vertical .division-body {
                display: flex;
                align-items: flex-end;
            }
            
            .vertical .division-divisor {
                padding-right: 6px;
                font-weight: bold;
                font-family: var(--font-family);

            }
            
            .vertical .division-sign {
                border-left: 2.5px solid #000;
                border-top: 2.5px solid #000;
                padding: 3px 8px 2px 6px;
                margin-right: 2px;
                border-radius: 3px 0 0 0;
                display: flex;
                align-items: center;
            }
            
            .vertical .division-dividend {
                letter-spacing: 3px;

            .vertical .char-vertical {
                display: flex;

            }
            
            .vertical .char-vertical .line1 {
                letter-spacing: 3px;

                width: 100%;
                text-align: right;
                line-height: 1.2;

            }
            
            .vertical .char-vertical .line2-wrapper {

            /* 屏幕端也应用符号样式 */

<body>
    <div class="controls">
        <h3>📝 Alivn数学练习题生成器 V1.2</h3>
        
        <div class="notice">
            <strong>💡 使用说明：</strong>
            <br>✅ <strong>本练习题生成器为小学生初级阶段数学练习使用，不含小数、负数计算。</strong>
        </div>
        
        <div class="control-section">
            <h4>1️⃣ 难度等级</h4>
            <div class="radio-group">
                <label><input type="radio" name="difficulty" value="basic"> 基础（50%进位/借位）</label>
                <label><input type="radio" name="difficulty" value="standard" checked> 标准（70%进位/借位）</label>
                <label><input type="radio" name="difficulty" value="challenge"> 挑战（90%进位/借位）</label>
            </div>
        </div>
        
        <div class="control-section">
            <h4>2️⃣ 运算类型</h4>
            <div class="control-group">
                <label><input type="checkbox" name="operation" value="+" checked> 加法</label>
                <label><input type="checkbox" name="operation" value="-" checked> 减法</label>
                <label><input type="checkbox" name="operation" value="×" id="multCheckbox"> 乘法</label>
                <label><input type="checkbox" name="operation" value="÷" id="divCheckbox"> 除法</label>
            </div>
            
            <div class="sub-options" id="multOptions">
                <label><input type="checkbox" id="tableMult"> 仅限表内乘法（1~9）</label>
            </div>
            
            <div class="sub-options" id="divOptions">
                <label style="margin-right: 15px;">
                    <input type="radio" name="divType" value="normal" checked> 普通除法
                </label>
                <label style="margin-right: 15px;">
                    <input type="radio" name="divType" value="tableDiv"> 表内整除
                </label>
                <label>
                    <input type="radio" name="divType" value="tableRemDiv"> 表内有余数除法
                </label>
            </div>
        </div>
        
        <div class="control-section">
            <h4>3️⃣ 出题形式</h4>
            <div class="radio-group">
                <label><input type="radio" name="calcType" value="horizontal" checked> 横式计算题（每页20题）</label>
                <label><input type="radio" name="calcType" value="vertical"> 竖式计算题（每页12题）</label>
            </div>
        </div>
        
        <div class="control-section">
            <h4>4️⃣ 生成设置</h4>
            <div class="control-group">
                <label>填入页数：<input type="number" id="pageCount" value="1" min="1" max="50" style="width:60px; padding: 4px 6px; margin-left: 8px; border: 1px solid #ccc; border-radius: 4px;"> 页（你想要打印多少页？）</label>
            </div>
            <h4>5️⃣ 计算范围（填入与孩子能力相适应数字范围）</h4>
            <div class="range-inputs">
                <label>最小值：<input type="number" id="minValue" value="10" min="1"></label>
                <label>最大值：<input type="number" id="maxValue" value="999" min="2"></label>
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn btn-generate" onclick="generateProblems()">
                <span>🔄</span> 生成新题目
            </button>
            <button class="btn btn-print" onclick="window.print()">
                <span>🖨️</span> 打印/保存PDF
            </button>
        </div>
    </div>
    
    <div class="stats-panel" id="statsPanel" style="display: none;">
        <h4>📊 题目统计</h4>
        <div class="stats-grid" id="statsGrid"></div>
    </div>
    
    <div class="preview" id="exercisePreview">
        <!-- 页面将通过JavaScript动态生成 -->
    </div>

    <script>
        // 全局去重集合
        let generatedProblems = new Set();
        let problemStats = {};

        // 难度配置
        const difficultyConfig = {
            basic: { carryProbability: 0.5, candidateCount: 5 },
            standard: { carryProbability: 0.7, candidateCount: 8 },
            challenge: { carryProbability: 0.9, candidateCount: 12 }
        };

        // 初始化事件监听
        function initEventListeners() {
            document.getElementById('multCheckbox').addEventListener('change', function() {
                document.getElementById('multOptions').classList.toggle('show', this.checked);
            });
            
            document.getElementById('divCheckbox').addEventListener('change', function() {
                document.getElementById('divOptions').classList.toggle('show', this.checked);
            });
            
            document.querySelectorAll('input[name="calcType"]').forEach(function(radio) {
                radio.addEventListener('change', generateProblems);
            });
            
            document.querySelectorAll('input[name="difficulty"]').forEach(function(radio) {
                radio.addEventListener('change', generateProblems);
            });
        }

        // 随机整数生成
        function getRandomInt(min, max) {
            if (min > max) return max;
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        
        // 获取数字位数
        function getDigitCount(num) {
            return num.toString().length;
        }

        // ========== 进位/借位检测函数 ==========
        
        function getCarryCount(num1, num2) {
            let carry = 0, carryCount = 0;
            let s1 = num1.toString().padStart(Math.max(num1.toString().length, num2.toString().length), '0');
            let s2 = num2.toString().padStart(s1.length, '0');
            
            for (let i = s1.length - 1; i >= 0; i--) {
                let sum = parseInt(s1[i]) + parseInt(s2[i]) + carry;
                if (sum >= 10) {
                    carry = 1;
                    carryCount++;
                } else {
                    carry = 0;
                }
            }
            return carryCount;
        }

        function getBorrowCount(num1, num2) {
            let borrow = 0, borrowCount = 0;
            let s1 = num1.toString().padStart(Math.max(num1.toString().length, num2.toString().length), '0');
            let s2 = num2.toString().padStart(s1.length, '0');
            
            for (let i = s1.length - 1; i >= 0; i--) {
                let diff = parseInt(s1[i]) - parseInt(s2[i]) - borrow;
                if (diff < 0) {
                    borrow = 1;
                    borrowCount++;
                } else {
                    borrow = 0;
                }
            }
            return borrowCount;
        }

        function getMultiplicationCarryCount(num1, num2) {
            let carryCount = 0;
            let s1 = num1.toString();
            let s2 = num2.toString();
            
            if (num1 < 10 && num2 < 10) return 0;
            if (num1 >= 10 && num2 >= 10) return 1;
            if ((num1 >= 10 && num2 >= 5) || (num2 >= 10 && num1 >= 5)) return 1;
            
            if (num1 < 10 && num2 >= 10) {
                 if (num1 * (num2 % 10) >= 10 || (Math.floor(num2/10) * num1 >= 10)) return 1;
            }
            if (num2 < 10 && num1 >= 10) {
                 if (num2 * (num1 % 10) >= 10 || (Math.floor(num1/10) * num2 >= 10)) return 1;
            }

            return carryCount;
        }

        function hasCarry(num1, num2) { return getCarryCount(num1, num2) > 0; }
        function hasBorrow(num1, num2) { return getBorrowCount(num1, num2) > 0; }

        // ========== 题目指纹生成（智能去重） ==========
        
        function generateProblemFingerprint(num1, num2, operation) {
            let a = num1, b = num2;
            if (operation === '+' || operation === '×') {
                if (a > b) [a, b] = [b, a];
            }
            return `${a},${b},${operation}`;
        }

        // ========== 困难度评分 ==========
        
        function calculateDifficulty(num1, num2, operation) {
            const minValue = parseInt(document.getElementById('minValue').value);
            const maxValue = parseInt(document.getElementById('maxValue').value);
            
            let resultScore = 0;
            if (operation === '+') {
                resultScore = Math.min(100, ((num1 + num2) / (maxValue * 2)) * 100);
            } else if (operation === '-') {
                resultScore = Math.min(100, ((num1 - num2) / maxValue) * 100);
            } else if (operation === '×') {
                resultScore = Math.min(100, ((num1 * num2) / (maxValue * maxValue)) * 100);
            } else if (operation === '÷') {
                resultScore = Math.min(100, ((num1 / num2) / maxValue) * 100);
            }

            let carryScore = 0;
            if (operation === '+') carryScore = Math.min(100, getCarryCount(num1, num2) * 40);
            else if (operation === '-') carryScore = Math.min(100, getBorrowCount(num1, num2) * 40);
            else if (operation === '×') carryScore = Math.min(100, getMultiplicationCarryCount(num1, num2) * 50);

            let digitScore = Math.min(50, Math.abs(getDigitCount(num1) - getDigitCount(num2)) * 25);

            return resultScore + carryScore + digitScore;
        }

        // ========== 题目生成核心函数 ==========
        
        function generateAddition(minValue, maxValue, wantCarry) {
            if (wantCarry) {
                let attempts = 0;
                while (attempts < 100) {
                    let num1 = getRandomInt(minValue, maxValue);
                    let num2 = getRandomInt(minValue, maxValue);
                    if (hasCarry(num1, num2)) return [num1, num2];
                    attempts++;
                }
            }
            return [getRandomInt(minValue, maxValue), getRandomInt(minValue, maxValue)];
        }
        
        function generateSubtraction(minValue, maxValue, wantBorrow) {
            if (wantBorrow) {
                let attempts = 0;
                while (attempts < 100) {
                    let num1 = getRandomInt(minValue, maxValue);
                    let num2 = getRandomInt(minValue, maxValue);
                    if (num1 < num2) [num1, num2] = [num2, num1];
                    if (num1 > num2 && hasBorrow(num1, num2)) return [num1, num2];
                    attempts++;
                }
            }
            let num1 = getRandomInt(minValue, maxValue);
            let num2 = getRandomInt(minValue, maxValue);
            if (num1 < num2) [num1, num2] = [num2, num1];
            return [num1, num2];
        }
        
        function generateMultiplication(minValue, maxValue, useTableMult, wantCarry) {
            if (useTableMult) {
                const highCarryPairs = [[6,7],[6,8],[6,9],[7,6],[7,7],[7,8],[7,9],[8,4],[8,5],[8,6],[8,7],[8,8],[8,9],[9,3],[9,4],[9,5],[9,6],[9,7],[9,8],[9,9]];
                if (wantCarry && Math.random() < 0.7) {
                    const pair = highCarryPairs[getRandomInt(0, highCarryPairs.length - 1)];
                    return [pair[0], pair[1]];
                }
                return [getRandomInt(1, 9), getRandomInt(1, 9)];
            }
            
            let attempts = 0;
            while (attempts < 200) {
                let num1 = getRandomInt(minValue, maxValue);
                let num2 = getRandomInt(minValue, maxValue);
                
                if (wantCarry) {
                    if (getMultiplicationCarryCount(num1, num2) > 0) {
                        return [num1, num2];
                    }
                } else {
                    return [num1, num2];
                }
                attempts++;
            }
            return [getRandomInt(minValue, maxValue), getRandomInt(minValue, maxValue)];
        }
        
        // 【修复后的除法生成函数】
        function generateDivision(minValue, maxValue, divType, wantChallenge) {
            // 1. 表内余数除法 (除数 2-9, 商 2-9, 有余数)
            if (divType === 'tableRemDiv') {
                const divisor = getRandomInt(2, 9);
                const quotient = getRandomInt(2, 9);
                const remainder = getRandomInt(1, divisor - 1);
                return [divisor * quotient + remainder, divisor];
            } 
            // 2. 表内除法 (除数 2-9, 商 2-9)
            else if (divType === 'tableDiv') {
                const divisor = getRandomInt(2, 9);
                const quotient = getRandomInt(2, 9);
                return [divisor * quotient, divisor];
            } 
            // 3. 普通除法 (支持多位数除数)
            else {
                let attempts = 0;
                while (attempts < 300) {
                    // 策略：先生成除数，再生成商，最后算出被除数
                    // 除数范围：最小2，最大不超过 maxValue 的一半 (保证商至少为2)
                    // 为了让除数可以是多位数，我们放宽除数的上限
                    let maxPossibleDivisor = Math.floor(maxValue / 2); 
                    // 如果用户设置的最小值很大，除数也要相应调整
                    if (maxPossibleDivisor < 2) maxPossibleDivisor = 2;
                    
                    // 随机生成一个除数 (可以是多位数)
                    let divisor = getRandomInt(2, maxPossibleDivisor);
                    
                    // 计算商的有效范围
                    // 被除数 = divisor * quotient
                    // minValue <= divisor * quotient <= maxValue
                    // quotient >= ceil(minValue / divisor)
                    // quotient <= floor(maxValue / divisor)
                    let minQuotient = Math.ceil(minValue / divisor);
                    let maxQuotient = Math.floor(maxValue / divisor);
                    
                    // 确保商至少为 2 (避免太简单的题目如 x/1 或 x/x)
                    if (minQuotient < 2) minQuotient = 2;
                    
                    if (maxQuotient >= minQuotient) {
                        let quotient = getRandomInt(minQuotient, maxQuotient);
                        let dividend = divisor * quotient;
                        
                        // 双重检查范围
                        if (dividend >= minValue && dividend <= maxValue) {
                            return [dividend, divisor];
                        }
                    }
                    attempts++;
                }
                
                // 如果尝试多次失败，回退到简单的表内除法逻辑作为保底
                let divisor = getRandomInt(2, 9);
                let quotient = getRandomInt(2, 9);
                return [divisor * quotient, divisor];
            }
        }

        // ========== 单题生成 ==========
        
        function generateOneProblem(operation, calcType) {
            const minValue = parseInt(document.getElementById('minValue').value);
            const maxValue = parseInt(document.getElementById('maxValue').value);
            const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
            const config = difficultyConfig[difficulty];

            if (isNaN(minValue) || isNaN(maxValue) || minValue < 1 || maxValue < 2 || minValue >= maxValue) {
                return null;
            }

            let num1, num2;
            const useTableMult = document.getElementById('tableMult').checked;
            const divType = document.querySelector('input[name="divType"]:checked').value;
            const wantCarry = Math.random() < config.carryProbability;

            if (operation === '+') {
                [num1, num2] = generateAddition(minValue, maxValue, wantCarry);
            } else if (operation === '-') {
                [num1, num2] = generateSubtraction(minValue, maxValue, wantCarry);
            } else if (operation === '×') {
                [num1, num2] = generateMultiplication(minValue, maxValue, useTableMult, wantCarry);
            } else if (operation === '÷') {
                [num1, num2] = generateDivision(minValue, maxValue, divType, wantCarry);
            }

            if (isNaN(num1) || isNaN(num2) || num1 <= 0 || num2 <= 0) {
                num1 = getRandomInt(Math.max(10, minValue), Math.min(200, maxValue));
                num2 = getRandomInt(Math.max(2, minValue), Math.min(50, maxValue));
            }

            return { num1, num2, operation, calcType };
        }

        function generateProblemWithOp(operation, calcType) {
            const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
            const config = difficultyConfig[difficulty];
            let candidates = [];

            for (let i = 0; i < config.candidateCount; i++) {
                const problem = generateOneProblem(operation, calcType);
                if (problem) {
                    problem.difficulty = calculateDifficulty(problem.num1, problem.num2, problem.operation);
                    problem.fingerprint = generateProblemFingerprint(problem.num1, problem.num2, problem.operation);
                    candidates.push(problem);
                }
            }

            if (candidates.length === 0) return null;

            candidates.sort((a, b) => b.difficulty - a.difficulty);

            for (const candidate of candidates) {
                if (!generatedProblems.has(candidate.fingerprint)) {
                    generatedProblems.add(candidate.fingerprint);
                    
                    const op = candidate.operation;
                    const key = op === '+' ? '加法' : op === '-' ? '减法' : op === '×' ? '乘法' : '除法';
                    problemStats[key] = (problemStats[key] || 0) + 1;
                    
                    const hasCarryBorrow = (op === '+' && hasCarry(candidate.num1, candidate.num2)) ||
                                          (op === '-' && hasBorrow(candidate.num1, candidate.num2)) ||
                                          (op === '×' && getMultiplicationCarryCount(candidate.num1, candidate.num2) > 0);
                    if (hasCarryBorrow) {
                        problemStats[key + '（进位/借位）'] = (problemStats[key + '（进位/借位）'] || 0) + 1;
                    }
                    
                    return candidate;
                }
            }
            return null;
        }
        
        // ========== 主生成函数 ==========
        
        function generateProblems() {
            const preview = document.getElementById('exercisePreview');
            const statsPanel = document.getElementById('statsPanel');
            const statsGrid = document.getElementById('statsGrid');
            
            preview.innerHTML = '';
            generatedProblems = new Set();
            problemStats = {};
            
            const calcType = document.querySelector('input[name="calcType"]:checked').value;
            const countPerPage = calcType === 'horizontal' ? 20 : 12; 
            
            let pageNum = parseInt(document.getElementById('pageCount').value);
            if (isNaN(pageNum) || pageNum < 1) pageNum = 1;
            if (pageNum > 50) pageNum = 50;
            
            const checkboxes = document.querySelectorAll('input[name="operation"]:checked');
            const selectedOperations = Array.from(checkboxes).map(cb => cb.value);
            
            if (selectedOperations.length === 0) {
                alert('⚠️ 请至少选择一种运算类型');
                return;
            }
            
            // 计算配额
            const opCount = selectedOperations.length;
            const baseCount = Math.floor(countPerPage / opCount);
            let remainder = countPerPage % opCount;
            
            let quotas = {};
            let shuffledOps = [...selectedOperations].sort(() => Math.random() - 0.5);
            
            selectedOperations.forEach(op => {
                quotas[op] = baseCount;
            });
            
            for (let i = 0; i < remainder; i++) {
                quotas[shuffledOps[i]]++;
            }
            
            let totalGenerated = 0;
            
            for (let pageIndex = 0; pageIndex < pageNum; pageIndex++) {
                const page = document.createElement('div');
                page.className = 'page ' + calcType;
                
                // 添加页眉
                const header = document.createElement('div');
                header.className = 'page-header';
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'header-item';
                nameDiv.innerHTML = '<span>姓名：</span><div class="header-line"></div>';
                
                const dateDiv = document.createElement('div');
                dateDiv.className = 'header-item';
                dateDiv.innerHTML = '<span>日期：</span><div class="header-line" style="flex-grow:0.5; min-width:50px;"></div>年<div class="header-line" style="flex-grow:0.3; min-width:25px;"></div>月<div class="header-line" style="flex-grow:0.3; min-width:25px;"></div>日';
                
                header.appendChild(nameDiv);
                header.appendChild(dateDiv);
                page.appendChild(header);
                
                let pageProblems = [];
                
                for (let op of selectedOperations) {
                    let targetCount = quotas[op];
                    let generatedCount = 0;
                    let attempts = 0;
                    const maxAttempts = targetCount * 10;
                    
                    while (generatedCount < targetCount && attempts < maxAttempts) {
                        const problem = generateProblemWithOp(op, calcType);
                        if (problem) {
                            pageProblems.push(problem);
                            generatedCount++;
                            totalGenerated++;
                        }
                        attempts++;
                    }
                }
                
                // 打乱顺序
                pageProblems.sort(() => Math.random() - 0.5);
                
                // 渲染
                for (const problem of pageProblems) {
                    const { num1, num2, operation } = problem;
                    const problemContainer = document.createElement('div');
                    problemContainer.className = 'problem-container';
                    
                    if (calcType === 'horizontal') {
                        problemContainer.textContent = `${num1} ${operation} ${num2} =`;
                    } else {
                        const verticalWrapper = document.createElement('div');
                        verticalWrapper.className = 'vertical-wrapper';
                        
                        if (operation === '÷') {
                            // 除法保持原有逻辑
                            const divWrapper = document.createElement('div');
                            divWrapper.className = 'division-wrapper';
                            
                            const bodyDiv = document.createElement('div');
                            bodyDiv.className = 'division-body';
                            
                            const divisorSpan = document.createElement('span');
                            divisorSpan.className = 'division-divisor';
                            divisorSpan.textContent = num2;
                            
                            const signSpan = document.createElement('span');
                            signSpan.className = 'division-sign';
                            
                            const dividendSpan = document.createElement('span');
                            dividendSpan.className = 'division-dividend';
                            dividendSpan.textContent = num1.toString().split('').join(' ');
                            
                            signSpan.appendChild(dividendSpan);
                            bodyDiv.appendChild(divisorSpan);
                            bodyDiv.appendChild(signSpan);
                            
                            divWrapper.appendChild(bodyDiv);
                            verticalWrapper.appendChild(divWrapper);
                        } else {
                            // 加减乘：应用新符号样式
                            const charVertical = document.createElement('div');
                            charVertical.className = 'char-vertical';
                            
                            const line1 = document.createElement('div');
                            line1.className = 'line1';
                            line1.textContent = num1.toString().split('').join(' ');
                            
                            const line2Wrapper = document.createElement('div');
                            line2Wrapper.className = 'line2-wrapper';
                            
                            // 符号独立，绝对定位
                            const opChar = document.createElement('span');
                            opChar.className = 'operator-char';
                            if (operation === '×') opChar.textContent = '×';
                            else if (operation === '+') opChar.textContent = '+';
                            else if (operation === '-') opChar.textContent = '−';
                            
                            // 数字部分
                            const num2Span = document.createElement('span');
                            num2Span.className = 'num2-span';
                            num2Span.textContent = num2.toString().split('').join(' ');
                            
                            line2Wrapper.appendChild(opChar);
                            line2Wrapper.appendChild(num2Span);
                            
                            const divider = document.createElement('div');
                            divider.className = 'divider';
                            
                            const emptyLine = document.createElement('div');
                            emptyLine.className = 'empty-line';
                            
                            charVertical.appendChild(line1);
                            charVertical.appendChild(line2Wrapper);
                            charVertical.appendChild(divider);
                            charVertical.appendChild(emptyLine);
                            
                            verticalWrapper.appendChild(charVertical);
                        }
                        
                        problemContainer.appendChild(verticalWrapper);
                    }
                    
                    page.appendChild(problemContainer);
                }
                
                // 填充空位
                let currentCount = pageProblems.length;
                while (currentCount < countPerPage) {
                    const problemContainer = document.createElement('div');
                    problemContainer.className = 'problem-container';
                    problemContainer.innerHTML = '&nbsp;';
                    page.appendChild(problemContainer);
                    currentCount++;
                }
                
                preview.appendChild(page);
            }
            
            displayStats(totalGenerated, pageNum * countPerPage);
        }
        
        function displayStats(actual, expected) {
            const statsPanel = document.getElementById('statsPanel');
            const statsGrid = document.getElementById('statsGrid');
            
            if (Object.keys(problemStats).length === 0) {
                statsPanel.style.display = 'none';
                return;
            }
            
            statsPanel.style.display = 'block';
            statsGrid.innerHTML = '';
            
            const totalItem = document.createElement('div');
            totalItem.className = 'stat-item';
            totalItem.style.borderLeftColor = '#4CAF50';
            totalItem.innerHTML = `
                <div class="stat-label">实际生成</div>
                <div class="stat-value">${actual} / ${expected}</div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${(actual / expected) * 100}%"></div>
                </div>
            `;
            statsGrid.appendChild(totalItem);
            
            for (const [key, value] of Object.entries(problemStats)) {
                const item = document.createElement('div');
                item.className = 'stat-item';
                item.innerHTML = `
                    <div class="stat-label">${key}</div>
                    <div class="stat-value">${value}题</div>
                `;
                statsGrid.appendChild(item);
            }
            
            const uniqueItem = document.createElement('div');
            uniqueItem.className = 'stat-item';
            uniqueItem.style.borderLeftColor = '#FF9800';
            uniqueItem.innerHTML = `
                <div class="stat-label">去重题目数</div>
                <div class="stat-value">${generatedProblems.size}</div>
            `;
            statsGrid.appendChild(uniqueItem);
        }
        
        window.onload = function() {
            initEventListeners();
            generateProblems();
        };
    </script>
